<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Resgate Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        :root { --bg: #0f172a; --card: #1e293b; --primary: #6366f1; --text: #f1f5f9; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 20px; }
        input, select, button, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { background: var(--primary); font-weight: 600; cursor: pointer; border: none; }
        .hidden { display: none; }
        .success-box { background: #064e3b; padding: 15px; border-radius: 10px; text-align: center; font-size: 18px; font-weight: bold; margin: 15px 0; }
        .msg-box { background: #334155; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 14px; border-left: 4px solid var(--primary); }
    </style>
</head>
<body>

    <div class="card" id="telaLogin">
        <h2>Login</h2>
        <input type="text" id="usuarioInput" placeholder="Usuário">
        <input type="password" id="senhaInput" placeholder="Senha">
        <label><input type="checkbox" onclick="toggleSenha('senhaInput')"> Mostrar Senha</label>
        <button onclick="verificarLogin()">Entrar</button>
    </div>

    <div class="card hidden" id="conteudoSite">
        <h2>Selecione o Serviço</h2>
        <select id="servico">
            <option>iFood</option><option>Google Play</option><option>Roblox</option>
            <option>Shopee</option><option>Amazon</option><option>PayPal</option>
        </select>
        <input type="number" id="valor" placeholder="Valor (R$)" oninput="calcular()">
        <p>Total a pagar: R$ <span id="precoFinal">0.00</span></p>
        <button onclick="mostrarPix()">Gerar Pagamento</button>
    </div>

    <div class="card hidden" id="pixArea">
        <p>Chave Pix: <b>0144f837-fb94-4565-ac32-c80f139af4e2</b></p>
        <button onclick="document.getElementById('confirmarArea').classList.remove('hidden')">Já realizei o Pix</button>
    </div>

    <div class="card hidden" id="confirmarArea">
        <input type="number" id="valorPago" placeholder="Valor pago">
        <input type="password" id="senhaLiberacao" placeholder="Senha de Liberação">
        <label><input type="checkbox" onclick="toggleSenha('senhaLiberacao')"> Mostrar Senha</label>
        <button onclick="liberarCodigo()">Validar Pagamento</button>
    </div>

    <div class="card hidden" id="resultadoFinal">
        <h2>Código Gerado</h2>
        <div class="success-box" id="codigoGerado"></div>
        
        <input type="number" id="nota" placeholder="Sua nota (0-10)" min="0" max="10">
        <input type="text" id="comentario" placeholder="Deixe um comentário">
        <button onclick="salvarFeedback()">Enviar Avaliação</button>
        
        <hr style="border:0; border-top:1px solid #334155; margin: 20px 0;">
        <h3>Suporte</h3>
        <textarea id="msgSuporte" placeholder="Escreva sua dúvida aqui..."></textarea>
        <button style="background:#475569" onclick="enviarSuporte()">Enviar para Suporte</button>
        
        <div id="historicoMensagens"></div>
    </div>

<script>
    function toggleSenha(id) {
        let x = document.getElementById(id);
        x.type = (x.type === "password") ? "text" : "password";
    }

    function verificarLogin() {
        if (document.getElementById('usuarioInput').value === "keven12" && document.getElementById('senhaInput').value === "140124") {
            document.getElementById('telaLogin').classList.add('hidden');
            document.getElementById('conteudoSite').classList.remove('hidden');
        } else { alert("Dados incorretos!"); }
    }

    function calcular() {
        document.getElementById('precoFinal').innerText = (document.getElementById('valor').value * 0.75).toFixed(2);
    }

    function mostrarPix() { document.getElementById('pixArea').classList.remove('hidden'); }

    function liberarCodigo() {
        let vPago = parseFloat(document.getElementById('valorPago').value);
        let vEsp = parseFloat((document.getElementById('valor').value * 0.75).toFixed(2));
        
        if (vPago === vEsp && document.getElementById('senhaLiberacao').value === "keven12") {
            // Gera exatamente 15 caracteres aleatórios
            let res = Math.random().toString(36).substring(2, 17).toUpperCase();
            document.getElementById('codigoGerado').innerText = res;
            document.getElementById('confirmarArea').classList.add('hidden');
            document.getElementById('resultadoFinal').classList.remove('hidden');
        } else { alert("Pagamento ou Senha inválidos!"); }
    }

    function salvarFeedback() {
        let nota = document.getElementById('nota').value;
        let msg = document.getElementById('comentario').value;
        let div = document.createElement('div');
        div.className = 'msg-box';
        div.innerHTML = "<b>Avaliação (" + nota + "/10):</b> " + msg;
        document.getElementById('historicoMensagens').appendChild(div);
        alert("Avaliação enviada!");
    }

    function enviarSuporte() {
        let msg = document.getElementById('msgSuporte').value;
        let div = document.createElement('div');
        div.className = 'msg-box';
        div.style.borderLeftColor = "#f59e0b";
        div.innerHTML = "<b>Suporte:</b> " + msg;
        document.getElementById('historicoMensagens').appendChild(div);
        document.getElementById('msgSuporte').value = "";
        alert("Mensagem enviada ao suporte!");
    }
</script>
</body>
</html>
