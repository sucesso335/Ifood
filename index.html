<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Resgate</title>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 450px; margin: auto; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.3); margin-top: 20px; }
        input, select, button { width: 100%; padding: 14px; margin-top: 15px; border-radius: 12px; border: none; font-size: 16px; box-sizing: border-box; }
        button { background-color: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        .code-box { font-size: 20px; font-weight: bold; color: #fbbf24; background: #334155; padding: 15px; border-radius: 10px; margin: 20px 0; text-align: center; border: 1px dashed #fbbf24; }
    </style>
</head>
<body>

<div class="container">
    <!-- Login -->
    <div id="telaLogin" class="card">
        <h2>Acesso ao Painel</h2>
        <input type="text" id="usuarioInput" placeholder="Usuário">
        <input type="password" id="senhaInput" placeholder="Senha">
        <button onclick="verificarLogin()">Entrar</button>
    </div>

    <!-- Conteúdo -->
    <div id="conteudoSite" class="card hidden">
        <h2>Selecione o Serviço</h2>
        <select id="servico">
            <option>iFood</option><option>Google Play</option><option>Roblox</option>
            <option>Shopee</option><option>Amazon</option><option>PayPal</option>
        </select>
        <input type="number" id="valor" placeholder="Valor (R$ 50 - R$ 1000)" oninput="calcular()">
        <p>Total a pagar (75%): <b>R$ <span id="precoFinal">0,00</span></b></p>
        <button onclick="mostrarPix()">Gerar Pagamento</button>
    </div>

    <!-- Pix -->
    <div id="pixArea" class="card hidden">
        <p>Chave Pix para pagamento:</p>
        <code style="display:block; background:#334155; padding:10px; border-radius:5px; word-break: break-all;">0144f837-fb94-4565-ac32-c80f139af4e2</code>
        <button onclick="abrirConfirmacao()" style="background:#059669">Já paguei, liberar Gift</button>
    </div>

    <!-- Confirmação -->
    <div id="confirmarArea" class="card hidden">
        <input type="number" id="valorPago" placeholder="Valor pago">
        <input type="password" id="senhaLiberacao" placeholder="Senha de Liberação">
        <button onclick="liberarCodigo()">Validar Pagamento</button>
    </div>

    <!-- Resultado -->
    <div id="resultadoFinal" class="card hidden">
        <h2 id="tituloRes">Resultado</h2>
        <div id="codigoGerado" class="code-box"></div>
        <button id="btnCopiar" onclick="copiarCodigo()" style="background:#10b981">Copiar Código</button>
        <button onclick="location.reload()">Nova Compra</button>
    </div>
</div>

<script>
    function verificarLogin() {
        if (document.getElementById('usuarioInput').value === "keven12" && document.getElementById('senhaInput').value === "140124") {
            document.getElementById('telaLogin').classList.add('hidden');
            document.getElementById('conteudoSite').classList.remove('hidden');
        } else { alert("Acesso Negado!"); }
    }

    function calcular() {
        var v = document.getElementById('valor').value;
        document.getElementById('precoFinal').innerText = (v * 0.75).toFixed(2);
    }

    function mostrarPix() { document.getElementById('pixArea').classList.remove('hidden'); }
    function abrirConfirmacao() { document.getElementById('confirmarArea').classList.remove('hidden'); }

    function liberarCodigo() {
        var vPago = parseFloat(document.getElementById('valorPago').value);
        var sDigitada = document.getElementById('senhaLiberacao').value.trim();
        var vEsp = parseFloat((document.getElementById('valor').value * 0.75).toFixed(2));
        
        document.getElementById('confirmarArea').classList.add('hidden');
        document.getElementById('resultadoFinal').classList.remove('hidden');

        if (vPago === vEsp && sDigitada === "keven12") {
            // Gera um código de 15 caracteres (formato: XXXX-XXXX-XXXXX)
            var parte1 = Math.random().toString(36).substr(2, 4).toUpperCase();
            var parte2 = Math.random().toString(36).substr(2, 4).toUpperCase();
            var parte3 = Math.random().toString(36).substr(2, 5).toUpperCase();
            var cod = parte1 + '-' + parte2 + '-' + parte3;
            
            document.getElementById('tituloRes').innerText = "Gift Card Liberado!";
            document.getElementById('codigoGerado').innerText = cod;
        } else {
            document.getElementById('tituloRes').innerText = "Erro";
            document.getElementById('btnCopiar').classList.add('hidden');
            document.getElementById('codigoGerado').innerText = "PAGAMENTO INVÁLIDO";
        }
    }

    function copiarCodigo() {
        var cod = document.getElementById("codigoGerado").innerText;
        navigator.clipboard.writeText(cod);
        alert("Código copiado!");
    }
</script>
</body>
</html>
